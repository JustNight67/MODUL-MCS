{{ $sectionTitle := .Scratch.Get "sectionTitle" }}
{{ with (index .Site.Data.landing $sectionTitle) }}
{{ if eq .enable true }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<section id="{{ $sectionTitle }}" class="mt-100 mt-60">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 text-center mb-5">
                <h3 class="fw-bold mb-2">{{ .title }}</h3>
            </div>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-lg-5 card border-0 shadow-lg p-4" 
                 style="border-radius: 50px; background: linear-gradient(135deg, #C40000 20%, #ffffff 100%); min-height: 400px; position: relative; overflow: hidden;">
                
                <div class="swiper mySwiper" style="width: 100%; height: 100%;">
                    <div class="swiper-wrapper">
                        {{ range .items }}
                        <div class="swiper-slide">
                            <div class="d-flex flex-column align-items-center text-center justify-content-center h-100 p-3">
                                <h2 class="fw-bold mb-4" style="font-size: 1.8rem; color: #ffffff;">{{ .title }}</h2>
                                <div class="mb-4">
                                    {{ $img := resources.Get .imagePath }}
                                    <img src="{{ $img.RelPermalink }}" alt="{{ .title }}" class="img-fluid rounded-4 shadow-sm" style="max-width: 180px;">
                                </div>
                                <a href="{{ .buttonLink }}" class="btn btn-primary shadow px-5 py-2" 
                                   style="background-color: #C40000; border: none; font-weight: 700; border-radius: 5px;">
                                   {{ .buttonText }}
                                </a>
                            </div>
                        </div>
                        {{ end }}
                    </div>
                </div>

                <div class="swiper-button-next" style="color: #000 !important; right: 80px;"></div>
                <div class="swiper-button-prev" style="color: #000 !important; left: 80px;"></div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  var swiper = new Swiper(".mySwiper", {
    loop: true,
    navigation: {
      nextEl: ".swiper-button-next",
      prevEl: ".swiper-button-prev",
    },
    slidesPerView: 1,
    speed: 600,
    allowTouchMove: false,
    grabCursor: false
  });
</script>
{{ end }}
{{ end }}
