# Note: Template blocks require a 'weight' parameter so they're correctly ordered on the landing page

# Hero
hero:
  enable: true
  weight: 10
  template: hero

  backgroundImage:
    path: "images/templates/hero"
    filename:
      desktop: "gradient-web.webp"
      mobile: "gradient-web.webp"

  badge:
    text: build v12.5.2026
    color: primary # primary, secondary, success, danger, warning, info, light, dark
    pill: false # boolean
    soft: true # boolean

  titleLogo:
    path: "images/logos"
    filename: "logo.svg"
    alt: "Lotus Docs Logo"
    height: 80px

  title: "ACSL Docs"
  subtitle: Selamat datang di situs dokumentasi **Mobile Computing System** Advanced Computer System Laboratory Universitas Gunadarma. Panduan ini dirancang untuk membantu **pemula IT Programmer dan mahasiswa** dalam memahami pemrograman berbasis mobile menggunakan Framework **Flutter** berbahasa **Dart**.
  image:
    path: "images/screenshots" # path to image under configured assets directory. default 'images'
    filename: "modul_mcs.gif" # filename of your hero image (including file extension)
    alt: "Lotus Docs Screenshot" # Optional but recommended
    boxShadow: true # default 'false' (excludes .svg images)
    rounded: true # round the image corners? default 'false' (excludes .svg images)

  ctaButton:
    icon: rocket_launch
    btnText: "Get Started"
    url: "/docs/"
  cta2Button:
    icon: construction
    btnText: "In Development"
    url: "https://github.com/colinwilson/lotusdocs"

  info: "**Copyright** @2026 Advanced Computer System Laboratory."

